name: Android build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test and build debug APK
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: ./gradlew testDebugUnitTest lintDebug assembleDebug

      - name: Upload debug APK
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: essential-key-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Decode release signing key
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: echo "$SIGNING_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/essential-key-release.jks"

      - name: Test and build signed release APK
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        env:
          SIGNING_STORE_FILE: ${{ runner.temp }}/essential-key-release.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew testDebugUnitTest lintRelease assembleRelease

      - name: Prepare release assets
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          cp app/build/outputs/apk/release/app-release.apk essential-key-remapper.apk
          sha256sum essential-key-remapper.apk > essential-key-remapper.apk.sha256

      - name: Publish GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            essential-key-remapper.apk \
            essential-key-remapper.apk.sha256 \
            --title "Essential Key Remapper ${GITHUB_REF_NAME#v}" \
            --generate-notes
